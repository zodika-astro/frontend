<!-- src/templates/birth-chart.embed.html -->

<!-- =========================================================================
  ZODIKA • Birth Chart Template
  ---------------------------------------------------------------------------
  Multi-step form template for the Birth Chart product
============================================================================= -->

<div class="natal-app" data-product="birth_chart" data-locale="pt-BR">
  <header class="form-header" aria-label="Zodika">
    <div class="form-logo">zodika</div>
    <div class="form-subtitle">mapa natal</div>
  </header>

  <main class="natal-shell">
    <div class="natal-form-container">
      <form class="natal-form" id="natalForm" novalidate>

        <!-- Progress -->
        <div class="progress-container" aria-hidden="true">
          <div class="progress-bar">
            <div class="progress-indicator">
              <div class="progress-step active"></div>
              <div class="progress-step"></div>
              <div class="progress-step"></div>
              <div class="progress-step"></div>
              <div class="progress-step"></div>
              <div class="progress-step"></div>
            </div>
          </div>
        </div>

        <!-- STEP 0 -->
        <section class="natal-step active" data-step="0" role="group">
          <h2 class="step-title">1. informe seu e-mail</h2>

          <input
            type="email"
            name="email"
            class="natal-input"
            required
            placeholder="Ex: ana@exemplo.com"
            autocomplete="email"
            aria-describedby="emailError"
          />

          <span class="error" id="emailError" hidden>
            por favor, insira um e-mail válido.
          </span>

          <button type="button" class="natal-btn next" data-action="next">
            próximo
          </button>
        </section>

        <!-- STEP 1 -->
        <section class="natal-step" data-step="1" role="group" aria-hidden="true">
          <h2 class="step-title">2. informe seu nome completo</h2>

          <input
            type="text"
            name="name"
            class="natal-input"
            required
            placeholder="Ex: Ana Ferreira"
            autocomplete="name"
            aria-describedby="nameError"
          />

          <span class="error" id="nameError" hidden>
            por favor, preencha seu nome completo.
          </span>

          <div class="btn-group">
            <button type="button" data-action="back">voltar</button>
            <button type="button" data-action="next">próximo</button>
          </div>
        </section>

        <!-- STEP 2 -->
        <section class="natal-step" data-step="2" aria-hidden="true">
          <h2 class="step-title">3. data de nascimento</h2>

          <input type="date" name="birth_date" required />

          <span class="error" id="dateError" hidden></span>

          <div class="btn-group">
            <button type="button" data-action="back">voltar</button>
            <button type="button" data-action="next">próximo</button>
          </div>
        </section>

        <!-- STEP 3 -->
        <section class="natal-step" data-step="3" aria-hidden="true">
          <h2 class="step-title">4. hora de nascimento</h2>

          <input type="time" name="birth_time" required />

          <span class="error" id="timeError" hidden></span>

          <div class="btn-group">
            <button type="button" data-action="back">voltar</button>
            <button type="button" data-action="next">próximo</button>
          </div>
        </section>

        <!-- STEP 4 -->
        <section class="natal-step" data-step="4" aria-hidden="true">
          <h2 class="step-title">5. cidade de nascimento</h2>

          <input
            id="cityInput"
            type="text"
            name="birth_place"
            required
            autocomplete="off"
          />

          <span class="error" id="cityError" hidden></span>

          <!-- hidden fields -->
          <input type="hidden" name="birth_place_place_id" />
          <input type="hidden" name="birth_place_full" />
          <input type="hidden" name="birth_place_country" />
          <input type="hidden" name="birth_place_admin1" />
          <input type="hidden" name="birth_place_admin2" />
          <input type="hidden" name="birth_place_lat" />
          <input type="hidden" name="birth_place_lng" />
          <input type="hidden" name="birth_place_json" />

          <div class="btn-group">
            <button type="button" data-action="back">voltar</button>
            <button type="button" data-action="next">próximo</button>
          </div>
        </section>

        <!-- STEP 5 -->
        <section class="natal-step" data-step="5" aria-hidden="true">
          <h2>confirmação</h2>

          <div id="confirmation-summary"></div>

          <label>
            <input type="checkbox" name="privacy_agreed" required />
            concordo com a política de privacidade
          </label>

          <span class="error" id="privacyError" hidden></span>

          <button type="submit">
            confirmar e pagar
          </button>
        </section>

      </form>

      <!-- OVERLAYS -->
      <div id="spinner" class="overlay" hidden></div>
      <div id="errorMessage" class="overlay" hidden></div>
    </div>
  </main>
</div>
